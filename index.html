		.progress {

			background-position: center;

			border-radius: 35px;

		}

		.progress .full {

		.progress_border_parent {

		}

		.progress_child {
			position: absolute;
			display: flex;
			align-items: center;
			justify-content: start;
			width: 100%;
			height: 100%;
			border-radius: 32px;
			overflow: hidden;
			padding: 0 5px;
			z-index: 1;
		}

		#loader {
			position: absolute;
			left: 0;
			top: 0;
			width: 100vw;
			height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background-color: black;
		}

		.spinner,
		.spinner:after {
			border-radius: 50%;
			width: 5em;
			height: 5em;
		}

		.spinner {
			margin: 10px;
			font-size: 10px;
			position: relative;
			text-indent: -9999em;
			border-top: 1.1em solid rgba(255, 255, 255, 0.2);
			border-right: 1.1em solid rgba(255, 255, 255, 0.2);
			border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
			border-left: 1.1em solid #ffffff;
			transform: translateZ(0);
			animation: spinner-spin 1.1s infinite linear;
		}

		@keyframes spinner-spin {
			0% {
				transform: rotate(0deg);
			}
			100% {
				transform: rotate(360deg);
			}
		}

	<script> 
		var container = document.getElementById("unity-container");
		var canvas = document.getElementById("unity-canvas");
		var loader = document.querySelector("#loader");

		var script = document.createElement("script");
		script.src = loaderUrl;
		script.onload = () => {
			createUnityInstance(canvas, config, (progress) => {
				const progressBar = document.querySelector("#loader .progress");
				if (!window.gameProgress) {
					progressBar.style.display = "block";
					window.gameProgress = progressBar.querySelector(".full");
					loader.querySelector(".spinner").style.display = "none";
				}
				
				let percent_progress = progress * 100;
				window.gameProgress.style.width = `${percent_progress}%`;
				
				if (progress === 1 && !window.removeTimeout) {
					window.removeTimeout = setTimeout(function () {
						loader.style.display = "none";
					}, 2000);
				}
			}).then((unityInstance) => {
				window.unityInstance = unityInstance;
				setTimeout(function() {
					loader.style.display = "none";
					window.focus();
				}, 2000);
				container.style.display = "block";
			}).catch((message) => {
				alert(message);
			});
		};
		document.body.appendChild(script);
	</script>
