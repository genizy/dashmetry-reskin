    <script>
const originalFetch = window.fetch;

window.fetch = async function(input, init) {
    let urlString;

    if (input instanceof Request) {
        urlString = input.url;
    } else {
        urlString = String(input);
    }

    if (urlString.includes("gamesdk")) {
        let newurl = new URL(urlString);
        newurl.searchParams.set("params", atob(`{"domain":"https://dashmetry.1games.io/","gameid":"dashmetry","timespan":"${Date.now()}"}`));
        if (input instanceof Request) {
            input = new Request(newurl.href);
        } else {
            input = newurl.href;
        }
    } else if (urlString.includes("api.1games.io")) {
        if (input instanceof Request) {
            input = new Request(urlString.replaceAll("api.1games.io", "1gamesbypassez.tmena1565.workers.dev"));
        } else {
            input = urlString.replaceAll("api.1games.io", "1gamesbypassez.tmena1565.workers.dev");
        }
    }

    const response = await originalFetch(input, init);

    if (urlString.includes("gamesdk")) {
        const clone = response.clone();
        const text = await clone.text();

        const modifiedText = btoa(atob(text).replace(window.location.hostname, "dashmetry.1games.io"));

        return new Response(modifiedText, {
            status: response.status,
            statusText: response.statusText,
            headers: response.headers
        });
    }

    return response;
};
    </script>

            border-right: 1.1em solid rgba(255, 255, 255, 0.2);
            border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
            border-left: 1.1em solid #ffffff;
            transform: translateZ(0);
            animation: spinner-spin 1.1s infinite linear;
        }

        @keyframes spinner-spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        const loaderUrl = basePath + "/geometry-dash-lite-v26020201.loader.js";

        const config = {
            dataUrl: basePath + "/geometry-dash-lite-v26020201.data.unityweb?sdgfgsdf",
            frameworkUrl: basePath + "/geometry-dash-lite-v26020201.framework.js.unityweb?sdgfdgs",
            codeUrl: basePath + "/geometry-dash-lite-v26020201.wasm.unityweb?sdfghdsfhhdf",
            streamingAssetsUrl: versionFolder + "StreamingAssets",
            companyName: "1games.io",
            productName: "Dashmetry",
            productVersion: "26020201",
            pubId: "",
            hostindex: 2,
            gameId: "geometry-dash-lite",
            eventLog: true,
            buildAPI: "https://event.azgame.io/apiaz/event",
            enableMoreGame: "yes",
            enablePromotion: false,
            gdHost: isHostOnGD()
        };

        const endLogDate = new Date("2025-07-23T02:18:03.775Z");
        if (new Date() > endLogDate) config.eventLog = false;

        if (config.gdHost) {
            config.enableMoreGame = "no";
            config.enablePromotion = false;
            config.eventLog = false;
            config.sdkType = "gd";
            config.gdGameId = "USE_GD_GAME_ID_CODE";
        }

        function isHostOnGD() {
            const parts = window.location.hostname.split('.');
            return parts.slice(-2).join('.') === "gamedistribution.com";
        }
    </script>

        <canvas id="unity-canvas"></canvas>

    <div id="loader">
        <img class="logo" src="26020201/logo.png?v1.0">
        <div class="spinner"></div>
        <div class="progress">
            <div class="progress_border_parent">
                <img class="progress_border_img" src="26020201/slider.png">

    <script>
        var container = document.getElementById("unity-container");
        var canvas = document.getElementById("unity-canvas");
        var loader = document.querySelector("#loader");

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                const progressBar = document.querySelector("#loader .progress");
                if (!window.gameProgress) {
                    progressBar.style.display = "block";
                    window.gameProgress = progressBar.querySelector(".full");
                    loader.querySelector(".spinner").style.display = "none";
                }

                let percent_progress = progress * 100;
                window.gameProgress.style.width = `${percent_progress}%`;

                if (progress === 1 && !window.removeTimeout) {
                    window.removeTimeout = setTimeout(function() {
                        loader.style.display = "none";
                    }, 2000);
                }
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                setTimeout(function() {
                    loader.style.display = "none";
                    window.focus();
                }, 2000);
                container.style.display = "block";
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);
    </script>
